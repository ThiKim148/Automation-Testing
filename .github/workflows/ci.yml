name: Automation Testing CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code từ repo về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Cài đặt Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Cài đặt các gói phụ thuộc
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Chạy kịch bản test API và xuất kết quả thô
    - name: Execute Automated API Tests
      run: |
        python -m pytest -m api -v --alluredir=reports/allure-results

    # 5. Lưu trữ kết quả thô (Artifacts) để chuyển giao cho quy trình CD
    - name: Archive Allure Results
      if: always() # Luôn chạy để giữ lại kết quả kể cả khi có test bị fail
      uses: actions/upload-artifact@v4
      with:
        name: raw-allure-results
        path: reports/allure-results
        retention-days: 1 # Chỉ cần lưu tạm 1 ngày để CD lấy dữ liệu