name: Automation Testing Pipeline (UI & API)

# 1. Định nghĩa điều kiện kích hoạt pipeline
on:
  push:
    branches: [ main, dev ] # Tự động chạy khi bạn push code lên nhánh main hoặc dev
  pull_request:
    branches: [ main ]      # Tự động chạy khi bạn tạo Pull Request muốn gộp vào main

# 2. Định nghĩa các công việc cần làm
jobs:
  run-automation-tests:
    runs-on: ubuntu-latest # Cấp máy ảo chạy hệ điều hành Linux Ubuntu mới nhất

    steps:
      # Bước 1: Tải toàn bộ mã nguồn kiểm thử từ kho lưu trữ GitHub về máy ảo
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Khởi tạo môi trường Python (Bản 3.10 ổn định cho Selenium & Requests)
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Tự động cache lại thư viện để các lần chạy sau nhanh hơn

      # Bước 3: Cài đặt các gói phụ thuộc từ file requirements.txt
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Bước 4: Chạy toàn bộ các kịch bản test (Cả API và UI)
      # Hệ thống tự đọc file pytest.ini của bạn để xuất kết quả thô vào reports/allure-results
      - name: Execute Automated Tests (API & UI)
        run: |
          pytest -v

      # Bước 5: Biên dịch dữ liệu thô thành báo cáo Allure dạng HTML trực quan
      # Bước này dùng từ khóa 'if: always()' để ĐẢM BẢO LUÔN CHẠY kể cả khi có bài test bị Failed
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: reports/allure-results
          allure_report: reports/allure-report
          allure_history: reports/allure-history

      # Bước 6: Đóng gói và upload thư mục báo cáo lên hệ thống Artifacts của GitHub
      # Giúp bạn có thể tải file zip báo cáo về máy để xem bất cứ lúc nào
      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: reports/allure-report
          retention-days: 7 # Báo cáo sẽ được lưu trữ trên GitHub trong vòng 7 ngày