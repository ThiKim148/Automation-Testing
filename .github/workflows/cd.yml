name: Allure Report CD

on:
  workflow_run:
    workflows:
      - Automation Testing CI
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-report:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      ALLURE_VERSION: 2.34.1

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Raw Allure Results
      uses: actions/download-artifact@v4
      with:
        name: raw-allure-results
        path: reports/allure-results
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install Allure CLI
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
        tar -zxvf allure-${ALLURE_VERSION}.tgz

    - name: Verify Allure
      run: allure --version

    - name: Generate Allure Report
      run: |
        allure generate reports/allure-results \ --clean \ -o allure-report

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: allure-report

    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4