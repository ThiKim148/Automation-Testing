name: Automation Testing Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-automation-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code từ repo về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Cài đặt Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Thay bằng version Python bạn đang dùng
        cache: 'pip' # Tự động cache các thư viện pip

    # Bước 3: Cài đặt các gói phụ thuộc từ file requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest  # Ép buộc máy ảo phải cài đặt pytest trước
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Bước 4: Chạy toàn bộ các kịch bản test (Cả API và UI)
    - name: Execute Automated Tests (API & UI)
      run: |
        # Thêm tham số --alluredir để ép pytest xuất kết quả API vào đúng thư mục reports/allure-results
        python -m pytest -m api -v --alluredir=reports/allure-results
  
    # Bước 5: Biên dịch dữ liệu thô thành báo cáo Allure dạng HTML 
    - name: Generate Allure Report
      if: always() # Luôn luôn chạy bước này kể cả khi test API có bị failed
      uses: simple-elf/allure-report-action@master
      with:
        allure_results: reports/allure-results
        allure_report: reports/allure-report
        allure_history: reports/allure-history
        keep_reports: 20 # Giữ lại lịch sử của 20 lần chạy gần nhất

    # Bước 6 (CD): Tự động đẩy trang báo cáo Allure lên GitHub Pages
    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }} # Token tự động có sẵn của GitHub, không cần tạo thủ công
        publish_dir: reports/allure-report # Thư mục chứa trang web báo cáo cần deploy