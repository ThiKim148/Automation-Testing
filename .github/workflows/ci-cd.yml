name: Automation Testing Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-automation-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code từ repo về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Cài đặt Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Thay bằng version Python bạn đang dùng
        cache: 'pip' # Tự động cache các thư viện pip

    # Bước 3: Cài đặt các gói phụ thuộc từ file requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest  # Ép buộc máy ảo phải cài đặt pytest trước
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Bước 4: Chạy toàn bộ các kịch bản test (Cả API và UI)
    - name: Execute Automated Tests (API & UI)
      run: |
        python -m pytest -v || true
  
    # 5. Sinh báo cáo Allure và upload Artifact (Nếu bạn có dùng bước này)
    # (Bước này khớp với phần sinh 'allure-html-report' trong ảnh image_dbae66.png)
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-html-report
        path: allure-results