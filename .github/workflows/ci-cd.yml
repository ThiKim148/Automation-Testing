name: Automation Testing Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cấp quyền ghi trực tiếp vào hạ tầng GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-automation-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code từ repo về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Cài đặt Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Cài đặt các gói phụ thuộc từ file requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Chạy kịch bản test API
    - name: Execute Automated Tests (API & UI)
      run: |
        python -m pytest -m api -v --alluredir=reports/allure-results

    # 5. Biên dịch dữ liệu thô thành báo cáo Allure dạng HTML 
    - name: Generate Allure Report
      if: always()
      uses: simple-elf/allure-report-action@master
      with:
        allure_results: reports/allure-results
        allure_report: reports/allure-report
        allure_history: reports/allure-history
        keep_reports: 20

    # 6. Đóng gói thư mục báo cáo (Artifact) của Pages
    - name: Upload Pages Artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: reports/allure-report

    # 7. Deploy trực tiếp lên hạ tầng GitHub Pages (Thay thế cho bước bị lỗi 403)
    - name: Deploy to GitHub Pages
      if: always()
      uses: actions/deploy-pages@v4